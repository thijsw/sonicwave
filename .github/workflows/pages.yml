name: Deploy website

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp latest release version into the page
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName | sed 's/^v//')
          if [ -n "$version" ]; then
            perl -pi -e 's|(<span class="app-version">)[^<]*|${1}'"$version"'|g' site/index.html
          fi
          grep -o '<span class="app-version">[^<]*' site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
