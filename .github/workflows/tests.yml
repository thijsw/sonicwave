name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # The runner images ship several Xcodes; pick the newest so the
      # Swift 6 / macOS 15 SDK toolchain the project uses is available.
      - name: Select newest Xcode
        run: |
          XCODE="$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      # CODE_SIGNING_ALLOWED=NO: CI has no signing identities and the tests
      # don't need any (LiveDecodeTests self-skip without SONICWAVE_* env).
      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild -project Sonicwave.xcodeproj -scheme Sonicwave \
            -destination 'platform=macOS' test \
            CODE_SIGNING_ALLOWED=NO | tail -100
